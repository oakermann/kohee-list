<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | KOHEE LIST</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    :root { --bg:#f2f2f0; --ink:#1f1f1f; --line:#222; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:"Pretendard Variable", sans-serif; }
    html { width:100%; max-width:100%; overflow-x:hidden; }
    body { background:var(--bg); min-height:100vh; width:100%; max-width:100%; overflow-x:hidden; display:grid; place-items:center; padding:20px; }
    .box { width:min(92vw,420px); border:4px solid var(--line); background:#fff; padding:16px; box-shadow:4px 4px 0 rgba(34,34,34,.08); }
    h1 { font-size:1.4rem; font-weight:900; margin-bottom:12px; text-align:center; }
    .panel { display:none; }
    .panel.active { display:block; }
    input { width:100%; border:2px solid var(--line); padding:10px 10px; margin-bottom:7px; font-size:.88rem; font-weight:800; border-radius:0; outline:none; box-shadow:2px 2px 0 rgba(34,34,34,.08); letter-spacing:-.01rem; }
    input::placeholder { color:rgba(31,31,31,.45); font-weight:800; }
    input:focus { background:#fffdf8; box-shadow:2px 2px 0 rgba(255,90,0,.22); }
    button.primary { width:100%; border:2px solid var(--line); background:var(--line); color:#fff; padding:10px 12px; min-height:38px; font-size:.84rem; font-weight:900; cursor:pointer; box-shadow:2px 2px 0 rgba(34,34,34,.10); }
    button.sub-btn, .sub a { width:100%; text-align:center; border:2px solid var(--line); background:#fff; padding:9px 12px; min-height:34px; text-decoration:none; color:var(--ink); font-weight:900; font-size:.78rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:2px 2px 0 rgba(34,34,34,.07); }
    .sub { display:grid; gap:6px; margin-top:8px; }
    #msg { margin-top:10px; font-size:.8rem; font-weight:800; line-height:1.5; opacity:.75; min-height:18px; }
  </style>
</head>
<body>
  <main class="box">
    <h1 id="page-title">로그인</h1>

    <section id="login-panel" class="panel active">
      <input id="login-id" placeholder="아이디 (영문/숫자/_ 4~20자)">
      <input id="login-pw" type="password" placeholder="비밀번호 (8~72자)">
      <button id="btn-login" class="primary" type="button">로그인</button>
      <div class="sub">
        <button id="open-signup" class="sub-btn" type="button">회원가입</button>
      </div>
    </section>

    <section id="signup-panel" class="panel">
      <input id="signup-id" placeholder="아이디 (영문/숫자/_ 4~20자)">
      <input id="signup-pw" type="password" placeholder="비밀번호 (8~72자)">
      <button id="btn-signup" class="primary" type="button">회원가입</button>
      <div class="sub">
        <button id="back-login" class="sub-btn" type="button">로그인으로</button>
      </div>
    </section>

    <div class="sub">
      <a href="index.html">메인으로</a>
    </div>
    <p id="msg"></p>
  </main>

  <script type="module" src="./assets/login.js"></script>
</body>
</html>
