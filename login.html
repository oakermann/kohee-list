<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | KOHEE LIST</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link rel="stylesheet" href="./assets/login.css?v=20260430-1" />
  </head>
  <body>
    <main class="box">
      <h1 id="page-title">로그인</h1>

      <section id="login-panel" class="panel active">
        <input id="login-id" placeholder="아이디 (영문/숫자/_ 4~20자)" />
        <input id="login-pw" type="password" placeholder="비밀번호 (8~72자)" />
        <button id="btn-login" class="primary" type="button">로그인</button>
        <div class="sub">
          <button id="open-signup" class="sub-btn" type="button">
            회원가입
          </button>
        </div>
      </section>

      <section id="signup-panel" class="panel">
        <input id="signup-id" placeholder="아이디 (영문/숫자/_ 4~20자)" />
        <input id="signup-pw" type="password" placeholder="비밀번호 (8~72자)" />
        <button id="btn-signup" class="primary" type="button">회원가입</button>
        <div class="sub">
          <button id="back-login" class="sub-btn" type="button">
            로그인으로
          </button>
        </div>
      </section>

      <div class="sub">
        <a href="index.html">메인으로</a>
      </div>
      <p id="msg"></p>
    </main>

    <script type="module" src="./assets/login.js?v=20260426-1"></script>
  </body>
</html>
