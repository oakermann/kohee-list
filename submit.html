<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>제보하기 | KOHEE LIST</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link rel="stylesheet" href="./assets/submit.css?v=20260430-1" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1 class="hero-title">[ 제보하기 ]</h1>
        <div id="me" class="account-line">권한 확인 중...</div>
        <nav class="action-strip">
          <a class="mini-btn" href="index.html">메인</a>
          <a class="mini-btn" href="mypage.html">마이페이지</a>
        </nav>
      </section>

      <section class="section">
        <h2 class="section-head">카페 제보하기</h2>
        <div class="section-rule"></div>
        <div class="section-body">
          <div class="guide">
            제보는 즉시 공개되지 않고 운영진 검토 후 반영됩니다.
          </div>
          <input id="name" placeholder="카페명 *" />
          <input id="address" placeholder="주소 *" />
          <textarea id="desc" placeholder="카페 설명 *"></textarea>
          <textarea id="reason" placeholder="추천 이유"></textarea>

          <div class="cat-grid">
            <label class="chip"
              ><input type="checkbox" name="cat" value="espresso" /><span
                >에스프레소</span
              ></label
            >
            <label class="chip"
              ><input type="checkbox" name="cat" value="drip" /><span
                >드립</span
              ></label
            >
            <label class="chip"
              ><input type="checkbox" name="cat" value="decaf" /><span
                >디카페인</span
              ></label
            >
            <label class="chip"
              ><input type="checkbox" name="cat" value="instagram" /><span
                >인스타</span
              ></label
            >
            <label class="chip"
              ><input type="checkbox" name="cat" value="dessert" /><span
                >디저트</span
              ></label
            >
          </div>

          <button id="submit-btn" class="mini-btn primary" type="button">
            카페 제보 저장
          </button>
          <div id="msg" class="msg"></div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-head">오류 제보하기</h2>
        <div class="section-rule"></div>
        <div class="section-body">
          <div class="guide">
            카페 정보 오류, 링크 오류, 화면 오류 등을 알려주시면 운영진이
            확인합니다.
          </div>
          <input id="error-title" placeholder="오류 제목 *" />
          <input id="error-page" placeholder="관련 카페명 또는 페이지 (선택)" />
          <textarea id="error-content" placeholder="오류 내용 *"></textarea>
          <button id="error-submit-btn" class="mini-btn primary" type="button">
            오류 제보 저장
          </button>
          <div id="error-msg" class="msg"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./assets/submit.js?v=20260426-1"></script>
  </body>
</html>
