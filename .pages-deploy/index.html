<!doctype html>
<!-- kohee-deploy-check: codex-pages-20260428 -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>☕ 코히 리스트</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link rel="stylesheet" href="./assets/index.css?v=20260430-1" />
  </head>
  <body>
    <header>
      <div class="header-box">
        <h1 id="app-title" class="hero-title">
          <span class="hero-title-bracket">[</span>
          <span class="hero-title-text"> 코히 리스트 </span>
          <span class="hero-title-bracket">]</span>
        </h1>
        <div id="notice" class="notice-inline is-hidden"></div>
        <div id="auth-menu" class="auth-menu"></div>
      </div>
    </header>

    <main class="main-box">
      <div class="sticky-top">
        <div class="input-wrapper">
          <input
            id="search"
            type="text"
            placeholder="카페명 또는 주소 검색"
            class="input"
          />
          <button id="nearby-btn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polygon
                points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"
              ></polygon>
            </svg>
          </button>
        </div>
        <div id="tabs" class="tab-container"></div>
        <div id="distance-note" class="distance-note"></div>
        <div class="divider"></div>
      </div>
      <div id="list">
        <div class="center-msg">데이터를 불러오는 중입니다.</div>
      </div>
    </main>

    <footer>
      <div class="footer-brand">Inspired by Blind Coffee Addict</div>
      <div class="footer-text">
        Planned by <span class="admin-link">오커맨</span><br />
        Coded by Gemini ● Grok ● Chatgpt
      </div>
      <div class="copyright">© 2026 KOHEE LIST. ALL RIGHTS RESERVED.</div>
    </footer>

    <div id="modal-bg" class="overlay">
      <div class="modal">
        <div class="modal-meta">
          <div id="m-tags"></div>
          <button
            id="btn-favorite"
            class="fav-btn"
            type="button"
            aria-label="찜"
          >
            ☆
          </button>
        </div>
        <h2 id="m-name" class="modal-title"></h2>
        <div id="m-desc" class="modal-copy"></div>
        <div class="modal-actions">
          <button id="btn-map" class="modal-btn">📍 네이버 지도 보기</button>
          <button id="btn-share" class="modal-btn">🔗 공유하기</button>
          <button id="btn-insta" class="modal-btn is-hidden">
            ✨ 인스타 보기
          </button>
          <button id="btn-bean" class="modal-btn is-hidden">
            🫘 원두 구매
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./assets/index.js?v=20260426-1"></script>
  </body>
</html>
