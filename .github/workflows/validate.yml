name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  syntax:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run syntax checks
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\check-syntax.ps1

      - name: Run unit tests
        run: npm run test:unit
