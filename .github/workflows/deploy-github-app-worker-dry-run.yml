name: Deploy GitHub App Worker Dry Run

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deploy-dry-run-bot to deploy the dry-run automation Worker"
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: kohee-github-app-worker-dry-run
  cancel-in-progress: false

jobs:
  deploy-dry-run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy-dry-run-bot" ]; then
            echo "Confirmation did not match. Refusing to deploy."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run GitHub App Worker tests
        run: |
          node automation/github-app-worker/test/dry-run.test.mjs
          node automation/github-app-worker/test/fixtures.test.mjs

      - name: Check Cloudflare and webhook secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KOHEE_GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.KOHEE_GITHUB_APP_WEBHOOK_SECRET }}
        run: |
          missing=""
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID KOHEE_GITHUB_APP_WEBHOOK_SECRET; do
            if [ -z "${!name}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "Missing required secret(s):$missing"
            exit 1
          fi

      - name: Deploy dry-run Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config automation/github-app-worker/wrangler.toml

      - name: Register webhook secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KOHEE_GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.KOHEE_GITHUB_APP_WEBHOOK_SECRET }}
        run: |
          printf "%s" "$KOHEE_GITHUB_APP_WEBHOOK_SECRET" | npx wrangler secret put GITHUB_WEBHOOK_SECRET --config automation/github-app-worker/wrangler.toml

      - name: Verify health endpoint
        run: |
          curl --fail --silent --show-error https://kohee-github-app-worker-dry-run.gabefinder.workers.dev/health

      - name: Write summary
        if: always()
        run: |
          {
            echo "## GitHub App Worker dry-run deploy"
            echo ""
            echo "- Worker: kohee-github-app-worker-dry-run"
            echo "- Endpoint: https://kohee-github-app-worker-dry-run.gabefinder.workers.dev"
            echo "- Webhook path: /github/webhook"
            echo "- Mode: dry-run only"
            echo "- Bot enabled flag: false"
            echo "- Auto-merge flag: false"
            echo "- Issue-close flag: false"
          } >> "$GITHUB_STEP_SUMMARY"
