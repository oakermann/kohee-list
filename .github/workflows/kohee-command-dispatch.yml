name: KOHEE Command Dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task description for KOHEE_COMMAND"
        required: true
        type: string
      preset:
        description: "Preset profile for lane/risk/scope defaults"
        required: false
        default: custom
        type: choice
        options:
          - custom
          - smoke-ack
          - governance-readonly
          - frontend-admin
          - csv-export
          - audit-only
      risk:
        description: "Risk level override"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - LOW
          - MEDIUM
          - HIGH
      lane:
        description: "Lane override"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - GOVERNANCE
          - DEPLOY_SAFETY
          - PUBLIC_EXPOSURE
          - AUTH_ROLE
          - LIFECYCLE
          - CSV_PIPELINE
          - FRONTEND_RENDERING
      allowed_files:
        description: "Newline-delimited allowlist override"
        required: false
        default: ""
        type: string
      denied_files:
        description: "Newline-delimited denylist override"
        required: false
        default: ""
        type: string
      runtime_change_allowed:
        description: "Runtime change override"
        required: false
        default: preset
        type: choice
        options:
          - preset
          - "true"
          - "false"
      user_approval_required:
        description: "User approval override"
        required: false
        default: preset
        type: choice
        options:
          - preset
          - "true"
          - "false"
      merge_order:
        description: "Explicit sequential merge order metadata for parallel lanes"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write

jobs:
  validate-command:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate KOHEE command isolation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INPUT_TASK: ${{ inputs.task }}
          INPUT_PRESET: ${{ inputs.preset }}
          INPUT_RISK: ${{ inputs.risk }}
          INPUT_LANE: ${{ inputs.lane }}
          INPUT_ALLOWED_FILES: ${{ inputs.allowed_files }}
          INPUT_DENIED_FILES: ${{ inputs.denied_files }}
          INPUT_RUNTIME_CHANGE_ALLOWED: ${{ inputs.runtime_change_allowed }}
          INPUT_USER_APPROVAL_REQUIRED: ${{ inputs.user_approval_required }}
          INPUT_MERGE_ORDER: ${{ inputs.merge_order }}
        run: node scripts/validate-kohee-command.mjs

  dispatch:
    needs: validate-command
    runs-on: ubuntu-latest
    steps:
      - name: Create isolated KOHEE command issue
        id: create
        uses: actions/github-script@v7
        env:
          INPUT_TASK: ${{ inputs.task }}
          INPUT_PRESET: ${{ inputs.preset }}
          INPUT_RISK: ${{ inputs.risk }}
          INPUT_LANE: ${{ inputs.lane }}
          INPUT_ALLOWED_FILES: ${{ inputs.allowed_files }}
          INPUT_DENIED_FILES: ${{ inputs.denied_files }}
          INPUT_RUNTIME_CHANGE_ALLOWED: ${{ inputs.runtime_change_allowed }}
          INPUT_USER_APPROVAL_REQUIRED: ${{ inputs.user_approval_required }}
          INPUT_MERGE_ORDER: ${{ inputs.merge_order }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date().toISOString();
            const commandId = `kohee-${context.runId}-${Date.now()}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const labels = ["kohee-task", "codex"];
            const presets = {
              "smoke-ack": { risk: "LOW", lane: "GOVERNANCE", allowed_files: "read-only", denied_files: "*", runtime_change_allowed: false, user_approval_required: false, taskPrefix: "Acknowledge only / no edit / no branch / no PR." },
              "governance-readonly": { risk: "LOW", lane: "GOVERNANCE", allowed_files: "AGENTS.md\nkohee.contract.json\ndocs/CODEX_WORKFLOW.md\ndocs/audits/KOHEE_FINDINGS.md\n.github/pull_request_template.md\n.github/ISSUE_TEMPLATE/**\nscripts/audit-kohee.mjs\npackage.json", denied_files: "server/**\nassets/**\n.pages-deploy/**\nmigrations/**\nschema.sql", runtime_change_allowed: false, user_approval_required: false },
              "frontend-admin": { risk: "MEDIUM", lane: "FRONTEND_RENDERING", allowed_files: "admin.html\n.pages-deploy/admin.html\nassets/admin.js\n.pages-deploy/assets/admin.js\nassets/admin.css\n.pages-deploy/assets/admin.css\nassets/common.js\n.pages-deploy/assets/common.js", denied_files: "server/**\nmigrations/**\nschema.sql\nworker.js", runtime_change_allowed: false, user_approval_required: false },
              "csv-export": { risk: "MEDIUM", lane: "CSV_PIPELINE", allowed_files: "server/csv.js\nserver/routes.js\nassets/admin.js\n.pages-deploy/assets/admin.js\nadmin.html\n.pages-deploy/admin.html\nscripts/test-unit.mjs", denied_files: "migrations/**\nschema.sql\nworker.js\nCSV import/reset behavior\npublic /data behavior\nauth/session/security behavior", runtime_change_allowed: false, user_approval_required: true },
              "audit-only": { risk: "LOW", lane: "GOVERNANCE", allowed_files: "docs/audits/KOHEE_FINDINGS.md\nscripts/audit-kohee.mjs\npackage.json", denied_files: "server/**\nassets/**\n.pages-deploy/**\nmigrations/**\nschema.sql", runtime_change_allowed: false, user_approval_required: false }
            };
            const cleanPreset = (v) => String(v || "").trim() === "custom" ? "" : String(v || "").trim();
            const cleanChoice = (v) => String(v || "").trim() === "auto" ? "" : String(v || "").trim();
            const lines = (v) => String(v || "").split(/\r?\n/).map((x) => x.trim()).filter(Boolean).join("\n");
            const boolValue = (value, fallback) => {
              const normalized = String(value || "").trim().toLowerCase();
              if (!normalized || normalized === "preset" || normalized === "auto") return fallback;
              if (normalized === "true") return true;
              if (normalized === "false") return false;
              return fallback;
            };
            const selectedPreset = cleanPreset(process.env.INPUT_PRESET);
            const preset = presets[selectedPreset] || {};
            const risk = cleanChoice(process.env.INPUT_RISK) || preset.risk || "LOW";
            const lane = cleanChoice(process.env.INPUT_LANE) || preset.lane || "GOVERNANCE";
            const allowed = lines(process.env.INPUT_ALLOWED_FILES) || preset.allowed_files || "(none)";
            const denied = lines(process.env.INPUT_DENIED_FILES) || preset.denied_files || "(none)";
            const runtimeAllowed = boolValue(process.env.INPUT_RUNTIME_CHANGE_ALLOWED, preset.runtime_change_allowed ?? false);
            const approvalRequired = boolValue(process.env.INPUT_USER_APPROVAL_REQUIRED, preset.user_approval_required ?? false);
            const mergeOrder = String(process.env.INPUT_MERGE_ORDER || "").trim() || "(none)";
            const task = `${preset.taskPrefix ? `${preset.taskPrefix} ` : ""}${String(process.env.INPUT_TASK || "").trim()}`.trim();
            const yamlList = (raw) => {
              const items = String(raw || "").split(/\r?\n/).map((x) => x.trim()).filter(Boolean);
              return items.length ? items.map((x) => `    - ${x}`).join("\n") : "    - (none)";
            };
            const manualCodexComment = ["@" + "codex", "", "Please execute this KOHEE_COMMAND from the issue body.", "", "Acknowledge with KOHEE_STATUS.", "Follow the PR evidence guard.", "If this task requires code changes, use the existing GitHub PR flow and include the actual PR URL.", "Do not claim PR_OPEN without an actual GitHub PR URL."].join("\n");
            const marker = "<!-- kohee-command-dispatch:v1 -->";
            const title = `[KOHEE_COMMAND] ${lane} / ${risk} / ${task.slice(0, 80)}`;
            const body = `${marker}\n\n## Lane\n${lane}\n\n## Risk\n${risk}\n\n## Preset\n${selectedPreset || "(none)"}\n\n## Merge order\n${mergeOrder}\n\n## Scope / allowlist (files + functions)\n- Allowed files:\n${yamlList(allowed)}\n- Denied files:\n${yamlList(denied)}\n\n## KOHEE_COMMAND\n\n\`\`\`yaml\nKOHEE_COMMAND:\n  command_id: ${commandId}\n  state: QUEUED\n  risk: ${risk}\n  lane: ${lane}\n  source: GitHub Actions workflow_dispatch\n  owner: codex\n  terminal_state: MERGED_AND_DEPLOYED | DONE_NO_DEPLOY | HOLD\n  user_action_required: ${approvalRequired}\n  merge_order: ${mergeOrder}\n  task: ${task}\n  acceptance_criteria:\n    - Implement only allowed scope\n    - Run required verification commands\n    - Keep runtime change policy\n    - Preserve queue isolation\n    - Avoid parallel lane conflicts\n    - Do not overwrite unrelated command issues\n  allowed_files:\n${yamlList(allowed)}\n  denied_files:\n${yamlList(denied)}\n  runtime_change_allowed: ${runtimeAllowed}\n  do_not_change:\n${yamlList(denied)}\n  high_risk_hold:\n    - HOLD_HIGH_RISK\n    - HOLD_USER_APPROVAL\n    - HOLD_SCOPE_CONFLICT\n    - HOLD_CODEX_PR_PUBLISHING\n  created_at: ${now}\n  last_updated_at: ${now}\n\`\`\`\n\n## Manual Codex trigger required\n\nCodex Cloud auto-reaction is not guaranteed from bot comments. Post this comment manually from a user account:\n\n\`\`\`text\n${manualCodexComment}\n\`\`\`\n\n## PR evidence guard\n\n- Actual GitHub PR URL is required for \`PR_OPEN\`.\n- Commit hash, branch name, local task output, make_pr metadata, or internal draft without a real PR URL is \`UNVERIFIED\`.\n- GitHub evidence wins over Codex self-reports.\n\n## Dispatch evidence\n\n- workflow_run: ${runUrl}\n- overwrite_policy: create-only command issue\n`;
            const issue = (await github.rest.issues.create({ owner, repo, title, body, labels })).data;
            core.setOutput("issue_number", String(issue.number));
            core.setOutput("issue_url", issue.html_url);
            core.setOutput("effective_lane", lane);
            core.setOutput("effective_risk", risk);
            core.setOutput("effective_merge_order", mergeOrder);
            core.setOutput("manual_codex_comment", manualCodexComment);

      - name: Write workflow summary
        run: |
          {
            echo "## KOHEE command dispatch result"
            echo ""
            echo "- Issue: ${{ steps.create.outputs.issue_url }}"
            echo "- Issue number: #${{ steps.create.outputs.issue_number }}"
            echo "- Lane: ${{ steps.create.outputs.effective_lane }}"
            echo "- Risk: ${{ steps.create.outputs.effective_risk }}"
            echo "- Merge order: ${{ steps.create.outputs.effective_merge_order }}"
            echo "- Overwrite protection: create-only command issue"
            echo ""
            echo "## Manual Codex trigger required"
            echo '```text'
            echo "${{ steps.create.outputs.manual_codex_comment }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
