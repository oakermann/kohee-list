name: KOHEE Command Dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task description for KOHEE_COMMAND"
        required: true
        type: string
      preset:
        description: "Preset profile for lane/risk/scope defaults"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - smoke-ack
          - governance-readonly
          - frontend-admin
          - csv-export
          - audit-only
      risk:
        description: "Risk level (optional override)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - LOW
          - MEDIUM
          - HIGH
      lane:
        description: "Lane (optional override)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - GOVERNANCE
          - DEPLOY_SAFETY
          - PUBLIC_EXPOSURE
          - AUTH_ROLE
          - LIFECYCLE
          - CSV_PIPELINE
          - FRONTEND_RENDERING
      allowed_files:
        description: "Newline-delimited allowlist paths (optional override)"
        required: false
        default: ""
        type: string
      denied_files:
        description: "Newline-delimited denylist paths (optional override)"
        required: false
        default: ""
        type: string
      runtime_change_allowed:
        description: "Allow runtime behavior change (optional override)"
        required: false
        default: false
        type: boolean
      user_approval_required:
        description: "User approval required before completion (optional override)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update KOHEE command issue
        id: upsert
        uses: actions/github-script@v7
        env:
          INPUT_TASK: ${{ inputs.task }}
          INPUT_PRESET: ${{ inputs.preset }}
          INPUT_RISK: ${{ inputs.risk }}
          INPUT_LANE: ${{ inputs.lane }}
          INPUT_ALLOWED_FILES: ${{ inputs.allowed_files }}
          INPUT_DENIED_FILES: ${{ inputs.denied_files }}
          INPUT_RUNTIME_CHANGE_ALLOWED: ${{ inputs.runtime_change_allowed }}
          INPUT_USER_APPROVAL_REQUIRED: ${{ inputs.user_approval_required }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date().toISOString();
            const commandId = `kohee-${Date.now()}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const labels = ["kohee-task", "codex"];

            const presets = {
              "smoke-ack": {
                risk: "LOW",
                lane: "GOVERNANCE",
                allowed_files: "read-only",
                denied_files: "*",
                runtime_change_allowed: false,
                user_approval_required: false,
                taskPrefix: "Acknowledge only / no edit / no branch / no PR."
              },
              "governance-readonly": {
                risk: "LOW",
                lane: "GOVERNANCE",
                allowed_files: "AGENTS.md\nkohee.contract.json\ndocs/CODEX_WORKFLOW.md\ndocs/audits/KOHEE_FINDINGS.md\n.github/pull_request_template.md\n.github/ISSUE_TEMPLATE\nscripts/audit-kohee.mjs\npackage.json",
                denied_files: "server/**\nassets/**\n.pages-deploy/**\nmigrations/**\nschema.sql",
                runtime_change_allowed: false,
                user_approval_required: false
              },
              "frontend-admin": {
                risk: "MEDIUM",
                lane: "FRONTEND_RENDERING",
                allowed_files: "assets/admin.js\nadmin.html\nassets/common.js",
                denied_files: "server/**\nmigrations/**\nschema.sql\nworker.js",
                runtime_change_allowed: false,
                user_approval_required: false
              },
              "csv-export": {
                risk: "MEDIUM",
                lane: "CSV_PIPELINE",
                allowed_files: "server/csv.js\nserver/cafes.js\nscripts/test-unit.mjs",
                denied_files: "migrations/**\nschema.sql\nworker.js",
                runtime_change_allowed: false,
                user_approval_required: true
              },
              "audit-only": {
                risk: "LOW",
                lane: "GOVERNANCE",
                allowed_files: "docs/audits/KOHEE_FINDINGS.md\nscripts/audit-kohee.mjs\npackage.json",
                denied_files: "server/**\nassets/**\n.pages-deploy/**\nmigrations/**\nschema.sql",
                runtime_change_allowed: false,
                user_approval_required: false
              }
            };

            const selectedPreset = process.env.INPUT_PRESET || "";
            const preset = presets[selectedPreset] || {};

            const normalizeChoice = (value) => (value || "").trim();
            const normalizeMultiline = (value) =>
              (value || "")
                .split(/\r?\n/)
                .map((v) => v.trim())
                .filter(Boolean)
                .join("\n");

            const effectiveRisk = normalizeChoice(process.env.INPUT_RISK) || preset.risk || "LOW";
            const effectiveLane = normalizeChoice(process.env.INPUT_LANE) || preset.lane || "GOVERNANCE";
            const overrideAllowedFiles = normalizeMultiline(process.env.INPUT_ALLOWED_FILES);
            const overrideDeniedFiles = normalizeMultiline(process.env.INPUT_DENIED_FILES);
            const effectiveAllowedFiles = overrideAllowedFiles || preset.allowed_files || "(none)";
            const effectiveDeniedFiles = overrideDeniedFiles || preset.denied_files || "(none)";

            const parseBool = (value, fallback) => {
              if (value === undefined || value === null || value === "") return fallback;
              return String(value).toLowerCase() === "true";
            };
            const effectiveRuntimeChangeAllowed = parseBool(process.env.INPUT_RUNTIME_CHANGE_ALLOWED, preset.runtime_change_allowed ?? false);
            const effectiveUserApprovalRequired = parseBool(process.env.INPUT_USER_APPROVAL_REQUIRED, preset.user_approval_required ?? false);

            const baseTask = (process.env.INPUT_TASK || "").trim();
            const effectiveTask = preset.taskPrefix ? `${preset.taskPrefix} ${baseTask}` : baseTask;

            const toYamlList = (raw) => {
              const lines = (raw || "")
                .split(/\r?\n/)
                .map((v) => v.trim())
                .filter(Boolean);
              return lines.length ? lines.map((v) => `    - ${v}`).join("\n") : "    - (none)";
            };

            const manualCodexComment = `@codex\n\nPlease execute this KOHEE_COMMAND from the issue body.`;
            const issueTitle = `[KOHEE_COMMAND] ${effectiveLane} / ${effectiveRisk} / ${effectiveTask.slice(0, 80)}`;
            const dispatchMarker = "<!-- kohee-command-dispatch:v1 -->";

            const issueBody = `${dispatchMarker}\n\n## Lane\n${effectiveLane}\n\n## Risk\n${effectiveRisk}\n\n## Preset\n${selectedPreset || "(none)"}\n\n## Scope / allowlist (files + functions)\n- Allowed files:\n${toYamlList(effectiveAllowedFiles)}\n- Denied files:\n${toYamlList(effectiveDeniedFiles)}\n\n## KOHEE_COMMAND\n\n\`\`\`yaml\nKOHEE_COMMAND:\n  command_id: ${commandId}\n  state: QUEUED\n  risk: ${effectiveRisk}\n  lane: ${effectiveLane}\n  source: GitHub Actions workflow_dispatch\n  owner: codex\n  terminal_state: MERGED_AND_DEPLOYED | DONE_NO_DEPLOY | HOLD\n  user_action_required: ${effectiveUserApprovalRequired}\n  task: ${effectiveTask}\n  acceptance_criteria:\n    - Implement only allowed scope\n    - Run required verification commands\n    - Keep runtime change policy\n  allowed_files:\n${toYamlList(effectiveAllowedFiles)}\n  denied_files:\n${toYamlList(effectiveDeniedFiles)}\n  runtime_change_allowed: ${effectiveRuntimeChangeAllowed}\n  do_not_change:\n    - server/**\n    - assets/**\n    - .pages-deploy/**\n    - migrations/**\n    - schema.sql\n  high_risk_hold: HOLD_HIGH_RISK\n  created_at: ${now}\n  last_updated_at: ${now}\n\`\`\`\n\n## Manual Codex trigger required\n\nCodex Cloud auto-reaction is not guaranteed from bot comments.\nPlease post the following comment manually from a user account:\n\n\`\`\`text\n${manualCodexComment}\n\`\`\`\n\n## Optional bot comment\n\nThe workflow may still post a bot comment with \`@codex\` as a convenience, but this does not guarantee automatic execution.\n\n## PR evidence guard\n\n- Actual GitHub PR URL is required for \`PR_OPEN\`.\n- Commit hash or make_pr metadata without real PR URL is \`UNVERIFIED\`.\n- If PR publishing is blocked, use \`HOLD_CODEX_PR_PUBLISHING\`.\n\n## Dispatch evidence\n- workflow_run: ${runUrl}\n`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "codex",
              per_page: 100
            });

            const matched = openIssues
              .filter((i) => i.title.startsWith(`[KOHEE_COMMAND] ${effectiveLane} / ${effectiveRisk}`))
              .find((i) => (i.body || "").includes(dispatchMarker));

            let issue;
            if (matched) {
              const updated = await github.rest.issues.update({
                owner,
                repo,
                issue_number: matched.number,
                title: issueTitle,
                body: issueBody,
                labels
              });
              issue = updated.data;
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body: issueBody,
                labels
              });
              issue = created.data;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: manualCodexComment
            });

            core.setOutput("issue_number", String(issue.number));
            core.setOutput("issue_url", issue.html_url);
            core.setOutput("effective_preset", selectedPreset || "(none)");
            core.setOutput("effective_lane", effectiveLane);
            core.setOutput("effective_risk", effectiveRisk);
            core.setOutput("effective_runtime_change_allowed", String(effectiveRuntimeChangeAllowed));
            core.setOutput("effective_user_approval_required", String(effectiveUserApprovalRequired));
            core.setOutput("manual_codex_comment", manualCodexComment);

      - name: Write workflow summary
        run: |
          {
            echo "## KOHEE command dispatch result"
            echo ""
            echo "- Issue: ${{ steps.upsert.outputs.issue_url }}"
            echo "- Issue number: #${{ steps.upsert.outputs.issue_number }}"
            echo "- Preset: ${{ steps.upsert.outputs.effective_preset }}"
            echo "- Lane: ${{ steps.upsert.outputs.effective_lane }}"
            echo "- Risk: ${{ steps.upsert.outputs.effective_risk }}"
            echo "- Runtime change allowed: ${{ steps.upsert.outputs.effective_runtime_change_allowed }}"
            echo "- User approval required: ${{ steps.upsert.outputs.effective_user_approval_required }}"
            echo ""
            echo "## Manual Codex trigger required"
            echo "Codex Cloud auto-reaction is not guaranteed from bot comments."
            echo "Post this comment manually from a user account:"
            echo '```text'
            echo "${{ steps.upsert.outputs.manual_codex_comment }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
