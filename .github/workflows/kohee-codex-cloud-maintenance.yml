name: KOHEE Codex Cloud Maintenance

on:
  workflow_dispatch:
  schedule:
    # 09:10 KST. Codex Cloud is the worker; Actions is only the scheduler here.
    - cron: "10 0 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: kohee-codex-cloud-maintenance
  cancel-in-progress: false

jobs:
  request-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Request parallel Codex Cloud maintenance
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const runId = context.runId;

            const tasks = [
              {
                key: "verify-deploy-smoke",
                title: "KOHEE_PARALLEL_MAINTENANCE: deploy smoke verification",
                risk: "LOW",
                lane: "DEPLOY_SAFETY",
                terminal: "DONE_NO_DEPLOY | HOLD",
                runtimeChangeAllowed: false,
                task:
                  "Read-only verification. Check latest audit warnings, open PR state, deploy status, and live smoke for Pages/Worker. Do not edit files and do not open a PR.",
                acceptance: [
                  "Run or verify relevant checks: npm run check:deploy-sync, npm run test:unit, npm run audit:kohee, git diff --check.",
                  "Verify live smoke when possible: Pages admin load, Worker /health, /health/db, /version, /data.",
                  "Report KOHEE_STATUS with VERIFIED, UNVERIFIED, or HOLD_DEPLOY_BLOCKED.",
                ],
                allowedFiles: ["read-only"],
                deniedFiles: ["*"],
              },
              {
                key: "manager-removal-audit",
                title: "KOHEE_PARALLEL_MAINTENANCE: manager removal audit",
                risk: "MEDIUM",
                lane: "AUTH_ROLE",
                terminal: "DONE_NO_DEPLOY | HOLD",
                runtimeChangeAllowed: false,
                task:
                  "Audit manager role removal impact. Manager is legacy and should not be expanded. Do not remove runtime behavior in this task; report exact safe cleanup candidates and HOLD risky auth/permission changes.",
                acceptance: [
                  "Identify manager references and classify as safe cleanup, follow-up, or HOLD.",
                  "Do not change auth/session/security behavior.",
                  "Do not open a PR unless the change is documentation-only and scoped to this issue.",
                ],
                allowedFiles: ["read-only", "docs/audits/KOHEE_FINDINGS.md only if documenting HOLD"],
                deniedFiles: ["server/**", "assets/**", "migrations/**", "schema.sql"],
              },
              {
                key: "review-result-csv-import-audit",
                title: "KOHEE_PARALLEL_MAINTENANCE: review-result CSV import HOLD audit",
                risk: "HIGH",
                lane: "CSV_PIPELINE",
                terminal: "DONE_NO_DEPLOY | HOLD",
                runtimeChangeAllowed: false,
                task:
                  "Audit review-result CSV import/upload only. This feature remains HOLD. Do not implement import/upload, reset behavior, D1 changes, or public API changes.",
                acceptance: [
                  "Confirm review-result CSV import/upload is not implemented.",
                  "Confirm no public exposure or accidental UI activation exists.",
                  "Report HOLD if implementation is requested or required.",
                ],
                allowedFiles: ["read-only"],
                deniedFiles: ["server/**", "assets/**", "migrations/**", "schema.sql"],
              },
              {
                key: "admin-console-ux-cleanup",
                title: "KOHEE_PARALLEL_MAINTENANCE: admin console UX cleanup",
                risk: "MEDIUM",
                lane: "FRONTEND_RENDERING",
                terminal: "DONE_NO_DEPLOY | PR_OPEN | HOLD",
                runtimeChangeAllowed: false,
                task:
                  "Inspect admin console fallback/UX and patch only safe frontend cleanup using existing endpoints. Keep safe DOM rendering and root/.pages-deploy sync.",
                acceptance: [
                  "Patch only if a clear LOW/MEDIUM admin UX cleanup exists.",
                  "Use existing endpoints only.",
                  "Bump admin asset versions if admin assets change.",
                  "Run npm run check:deploy-sync, npm run test:unit, npm run audit:kohee, git diff --check.",
                ],
                allowedFiles: [
                  "admin.html",
                  ".pages-deploy/admin.html",
                  "assets/admin.js",
                  ".pages-deploy/assets/admin.js",
                  "assets/admin.css",
                  ".pages-deploy/assets/admin.css",
                  "scripts/test-unit.mjs only if needed",
                ],
                deniedFiles: ["server/**", "migrations/**", "schema.sql", ".github/workflows/**"],
              },
              {
                key: "codex-workflow-verification",
                title: "KOHEE_PARALLEL_MAINTENANCE: Codex Cloud workflow verification",
                risk: "LOW",
                lane: "GOVERNANCE",
                terminal: "DONE_NO_DEPLOY | HOLD",
                runtimeChangeAllowed: false,
                task:
                  "Verify Codex Cloud workflow behavior from GitHub evidence. Confirm maintenance issues, @codex replies, and PR/check flow. Do not edit code.",
                acceptance: [
                  "Check recent KOHEE_CLOUD_MAINTENANCE and KOHEE_PARALLEL_MAINTENANCE issues.",
                  "Confirm @codex acknowledgement or mark QUEUED_STALE/HOLD_CODEX_NO_RESPONSE.",
                  "Do not open a PR for this verification-only task.",
                ],
                allowedFiles: ["read-only"],
                deniedFiles: ["*"],
              },
              {
                key: "findings-docs-cleanup",
                title: "KOHEE_PARALLEL_MAINTENANCE: findings docs cleanup",
                risk: "LOW",
                lane: "GOVERNANCE",
                terminal: "DONE_NO_DEPLOY | PR_OPEN | HOLD",
                runtimeChangeAllowed: false,
                task:
                  "Clean docs/audits/KOHEE_FINDINGS.md only if it has stale, duplicated, or oversized active/recent findings. Do not change runtime code.",
                acceptance: [
                  "Keep only active OPEN/HOLD/recent fixed items.",
                  "Do not paste long logs.",
                  "Open a docs-only PR if cleanup is needed.",
                  "Do not edit runtime files.",
                ],
                allowedFiles: ["docs/audits/KOHEE_FINDINGS.md"],
                deniedFiles: ["server/**", "assets/**", ".github/workflows/**", "migrations/**", "schema.sql"],
              },
            ];

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
            });

            const createdIssueNumbers = [];

            for (const task of tasks) {
              const existing = issues.find((issue) => issue.title === task.title && !issue.pull_request);
              const issueBody = [
                "KOHEE_PARALLEL_MAINTENANCE:",
                `  key: ${task.key}`,
                "  purpose: Codex Cloud is the primary worker for this independent maintenance slice.",
                "  state: ACTIVE",
                `  risk: ${task.risk}`,
                `  lane: ${task.lane}`,
                "  owner: codex",
                "  user_action_required: false",
                "",
                "Parallel rules:",
                "- This issue is an independent Codex Cloud work slice.",
                "- Respect allowed_files and denied_files to avoid parallel conflicts.",
                "- GitHub Actions validates PRs and deploys only after clean main merges.",
                "- HIGH-risk or permission/secret/scope issues remain HOLD.",
                "",
                `Last scheduler run: ${runUrl}`,
                `Last updated: ${now}`,
              ].join("\n");

              let issueNumber;
              if (existing) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: issueBody,
                });
                issueNumber = existing.number;
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: task.title,
                  body: issueBody,
                });
                issueNumber = created.data.number;
              }
              createdIssueNumbers.push(issueNumber);

              const triggerBody = [
                "@codex",
                "",
                "KOHEE_COMMAND:",
                `  command_id: cloud-maintenance-${task.key}-${runId}`,
                "  state: QUEUED",
                `  risk: ${task.risk}`,
                `  lane: ${task.lane}`,
                "  source: GitHub Actions parallel scheduler",
                "  owner: codex",
                `  terminal_state: ${task.terminal}`,
                "  user_action_required: false",
                `  runtime_change_allowed: ${task.runtimeChangeAllowed}`,
                `  task: ${task.task}`,
                "  acceptance_criteria:",
                ...task.acceptance.map((item) => `    - ${item}`),
                "  allowed_files:",
                ...task.allowedFiles.map((item) => `    - ${item}`),
                "  denied_files:",
                ...task.deniedFiles.map((item) => `    - ${item}`),
                "  do_not_change:",
                "    - D1/schema/migrations",
                "    - CSV import/reset behavior",
                "    - auth/session/security behavior unless this task is audit-only",
                "    - public /data behavior",
                "    - deploy workflow behavior",
                "    - manager role expansion",
                "    - review-result CSV import/upload",
                "  high_risk_hold:",
                "    - server behavior changes beyond narrow safe LOW/MEDIUM fixes",
                "    - public API exposure",
                "    - auth/session/security",
                "    - D1/schema/migration",
                "    - CSV import/reset semantics",
                "    - role/permission policy",
                "    - Cloudflare secret/token/permission blockers",
                `  created_at: ${now}`,
                `  last_updated_at: ${now}`,
                "",
                "Codex Cloud is the primary executor for this slice. GitHub Actions is the validation/deploy gate.",
              ].join("\n");

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: triggerBody,
              });
            }

            await core.summary
              .addHeading("KOHEE Parallel Codex Cloud Maintenance")
              .addRaw(`Requested ${createdIssueNumbers.length} parallel Codex Cloud maintenance slices.`)
              .addBreak()
              .addRaw(`Issues: ${createdIssueNumbers.map((n) => `#${n}`).join(", ")}`)
              .write();
