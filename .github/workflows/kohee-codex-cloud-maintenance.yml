name: KOHEE Codex Cloud Maintenance

on:
  workflow_dispatch:
    inputs:
      trigger_codex:
        description: "Post an explicit @codex analysis request to #23"
        required: false
        default: false
        type: boolean
      note:
        description: "Short maintenance note for the #23 control issue"
        required: false
        default: "routine maintenance check"

permissions:
  contents: read
  issues: write

concurrency:
  group: kohee-codex-cloud-maintenance
  cancel-in-progress: false

jobs:
  request-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Record manual maintenance request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const runId = context.runId;
            const controlIssueNumber = 23;
            const triggerCodex = core.getBooleanInput("trigger_codex");
            const rawNote = core.getInput("note") || "routine maintenance check";
            const safeNote = rawNote.replace(/\s+/g, " ").trim().slice(0, 240);

            const sharedRules = [
              "Operating rules:",
              "- Use #23 as the single ACTIVE maintenance control issue.",
              "- Do not create parallel maintenance issues from this workflow.",
              "- Codex issue-triggered work is analysis-only unless a real GitHub PR URL exists.",
              "- Report PATCH_READY, DONE_NO_DEPLOY, or HOLD; do not claim PR_OPEN without an actual GitHub PR URL.",
              "- HIGH-risk work remains HOLD / user-approved only.",
              "- ChatGPT GitHub connector remains the reliable executor for branch, file, PR, check, and merge operations.",
            ];

            const body = triggerCodex
              ? [
                  "@codex",
                  "",
                  "KOHEE_COMMAND:",
                  `  command_id: manual-cloud-maintenance-${runId}`,
                  "  state: QUEUED",
                  "  risk: MEDIUM",
                  "  lane: DEPLOY_SAFETY",
                  "  source: manual KOHEE Codex Cloud Maintenance workflow",
                  "  owner: codex",
                  "  terminal_state: DONE_NO_DEPLOY | PATCH_READY | HOLD",
                  "  user_action_required: false",
                  "  runtime_change_allowed: false",
                  `  task: ${safeNote}. Inspect current GitHub evidence and report safe maintenance findings only. Do not create parallel issues. Do not edit files or open a PR from this issue-triggered path unless an actual GitHub PR URL can be produced and the work is safe LOW/MEDIUM.`,
                  "  acceptance_criteria:",
                  "    - Check open PR state and open KOHEE automation issues.",
                  "    - Report DONE_NO_DEPLOY if no action is needed.",
                  "    - Report PATCH_READY if a safe LOW/MEDIUM patch should be collected by ChatGPT GitHub connector.",
                  "    - Report HOLD for HIGH-risk, policy, permission, secret, D1/schema, CSV import/reset, or public API behavior decisions.",
                  "    - Do not report PR_OPEN without an actual GitHub PR URL.",
                  "  allowed_files:",
                  "    - read-only",
                  "  denied_files:",
                  "    - *",
                  "  do_not_change:",
                  "    - D1/schema/migrations",
                  "    - CSV import/reset behavior",
                  "    - auth/session/security behavior",
                  "    - public /data behavior",
                  "    - deploy workflow behavior",
                  "    - manager role expansion/removal",
                  "    - review-result CSV import/upload",
                  `  created_at: ${now}`,
                  `  last_updated_at: ${now}`,
                  "",
                  ...sharedRules,
                  "",
                  `Workflow run: ${runUrl}`,
                ]
              : [
                  "KOHEE_MAINTENANCE_NOTE:",
                  "  state: RECORDED",
                  "  issue: #23",
                  "  trigger_codex: false",
                  `  note: ${safeNote}`,
                  `  recorded_at: ${now}`,
                  "",
                  "No @codex mention was posted because trigger_codex=false. This avoids scheduled/accidental fan-out noise.",
                  "",
                  ...sharedRules,
                  "",
                  `Workflow run: ${runUrl}`,
                ];

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: controlIssueNumber,
              body: body.join("\n"),
            });

            await core.summary
              .addHeading("KOHEE Codex Cloud Maintenance")
              .addRaw(`Recorded maintenance note on #${controlIssueNumber}.`)
              .addBreak()
              .addRaw(`trigger_codex: ${triggerCodex}`)
              .addBreak()
              .addRaw("No parallel maintenance issues were created.")
              .write();
