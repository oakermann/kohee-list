name: Maintenance Scheduled

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  maintenance:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run safe maintenance
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\auto-maintenance.ps1

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-${{ github.run_number }}
          path: backups/cafes-*.csv
          if-no-files-found: warn
          retention-days: 7

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Automation failure: Maintenance Scheduled";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "Scheduled maintenance workflow failed.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              `- Actor: ${context.actor}`
            ].join("\n");

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open"
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }
