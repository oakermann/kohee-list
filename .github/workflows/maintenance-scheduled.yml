name: Maintenance Scheduled

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read
  actions: read

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run read-only maintenance audit
        run: npm run audit:maintenance

      - name: Write maintenance summary
        if: always()
        run: |
          {
            echo "## KOHEE maintenance audit"
            echo ""
            echo "- state: ${{ job.status }}"
            echo "- mode: read-only"
            echo "- risk: LOW"
            echo "- lane: GOVERNANCE"
            echo "- issue_write_enabled: false"
            echo "- csv_backup_enabled: false"
            echo "- artifact_upload_enabled: false"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
