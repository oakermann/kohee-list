name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kohee-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        shell: powershell
        run: |
          if (Test-Path package-lock.json) {
            npm ci
          } else {
            npm install
          }

      - name: Verify release
        shell: powershell
        run: npm run verify:release

      - name: Detect changed areas
        id: changes
        shell: powershell
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: node scripts/detect-changed-areas.mjs

      - name: Check Cloudflare secrets
        id: secrets
        shell: powershell
        env:
          NEEDS_CLOUDFLARE: ${{ steps.changes.outputs.shouldDeployPages == 'true' || steps.changes.outputs.shouldDeployWorker == 'true' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if ($env:NEEDS_CLOUDFLARE -ne "true") {
            "required=false" >> $env:GITHUB_OUTPUT
            "checked=false" >> $env:GITHUB_OUTPUT
            "result=not required" >> $env:GITHUB_OUTPUT
            exit 0
          }

          "required=true" >> $env:GITHUB_OUTPUT
          "checked=true" >> $env:GITHUB_OUTPUT

          $missing = @()
          if (-not $env:CLOUDFLARE_API_TOKEN) {
            $missing += "CLOUDFLARE_API_TOKEN"
          }
          if (-not $env:CLOUDFLARE_ACCOUNT_ID) {
            $missing += "CLOUDFLARE_ACCOUNT_ID"
          }

          if ($missing.Count -gt 0) {
            "result=missing: $($missing -join ', ')" >> $env:GITHUB_OUTPUT
            throw "Missing required GitHub Actions secret(s): $($missing -join ', ')"
          }

          "result=present" >> $env:GITHUB_OUTPUT

      - name: Write deploy summary
        if: always()
        shell: powershell
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## KOHEE Deploy Summary"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Commit SHA: ${{ github.sha }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Branch: ${{ github.ref_name }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Event: ${{ github.event_name }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verify release: completed"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Frontend changed: ${{ steps.changes.outputs.frontendChanged }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Worker changed: ${{ steps.changes.outputs.workerChanged }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- D1 changed: ${{ steps.changes.outputs.d1Changed }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Docs only: ${{ steps.changes.outputs.docsOnlyChanged }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Workflow changed: ${{ steps.changes.outputs.workflowChanged }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Tooling changed: ${{ steps.changes.outputs.toolingChanged }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Pages deploy: ${{ steps.changes.outputs.shouldDeployPages }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Pages skip reason: ${{ steps.changes.outputs.pagesSkipReason }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Worker deploy: ${{ steps.changes.outputs.shouldDeployWorker }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Worker skip reason: ${{ steps.changes.outputs.workerSkipReason }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- D1 auto-deploy blocked: ${{ steps.changes.outputs.shouldBlockAutoDeployDueToD1 }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Manual migration required: ${{ steps.changes.outputs.manualMigrationRequired }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Secrets required: ${{ steps.secrets.outputs.required }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Secrets check: ${{ steps.secrets.outputs.result }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Smoke check: ${{ steps.changes.outputs.smokeCheckPlan }}"

      - name: Record manual migration requirement
        if: steps.changes.outputs.shouldBlockAutoDeployDueToD1 == 'true'
        shell: powershell
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Manual migration required"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- D1/schema/migration change detected."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Pages deploy: skipped — D1 migration requires manual review."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Worker deploy: skipped — D1 migration requires manual review."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Remote D1 migration was not applied automatically."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Confirm production D1 backup, schema match, and manual approval before applying migrations."

      - name: Deploy Cloudflare Pages
        id: pages_deploy
        if: steps.changes.outputs.shouldDeployPages == 'true' && steps.changes.outputs.shouldBlockAutoDeployDueToD1 != 'true'
        shell: powershell
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy .pages-deploy --project-name kohee --branch main

      - name: Smoke check Pages
        id: pages_smoke
        if: steps.changes.outputs.shouldDeployPages == 'true' && steps.changes.outputs.shouldBlockAutoDeployDueToD1 != 'true'
        shell: powershell
        run: node scripts/smoke-check.mjs --pages

      - name: Deploy Cloudflare Worker
        id: worker_deploy
        if: steps.changes.outputs.shouldDeployWorker == 'true' && steps.changes.outputs.shouldBlockAutoDeployDueToD1 != 'true'
        shell: powershell
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Smoke check Worker
        id: worker_smoke
        if: steps.changes.outputs.shouldDeployWorker == 'true' && steps.changes.outputs.shouldBlockAutoDeployDueToD1 != 'true'
        shell: powershell
        run: node scripts/smoke-check.mjs --worker

      - name: Write final deploy summary
        if: always()
        shell: powershell
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Result"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Cloudflare deploy is controlled by changed-area detection."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- D1 migrations are never applied automatically."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Manual migration required: ${{ steps.changes.outputs.manualMigrationRequired }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Pages deploy outcome: ${{ steps.pages_deploy.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Pages smoke outcome: ${{ steps.pages_smoke.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Worker deploy outcome: ${{ steps.worker_deploy.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Worker smoke outcome: ${{ steps.worker_smoke.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- If Pages/Worker deploy steps were skipped, no Cloudflare publish was needed for this change."
