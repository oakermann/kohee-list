<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>마이페이지 | KOHEE LIST</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    :root {
      --bg: #f0f0f0;
      --ink: #1a1a1a;
      --line: #1a1a1a;
      --point: #ff5a00;
      --thick: 4px;
      --thin: 2px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Pretendard Variable", sans-serif !important;
      color: var(--ink) !important;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: var(--bg);
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-direction: column;
      padding: 32px 0 56px;
    }

    .page {
      width: 92%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero {
      border: var(--thick) solid var(--line);
      background: var(--bg);
      text-align: center;
    }

    .hero-title {
      padding: 18px 14px 8px;
      font-size: clamp(1.6rem, 7vw, 2.35rem);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.04rem;
    }

    .account-line {
      padding: 0 14px 14px;
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1.45;
      opacity: 0.78;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: white;
      padding: 2px 6px;
      margin-left: 4px;
      font-size: 0.62rem;
      font-weight: 900;
      vertical-align: 1px;
    }

    .action-strip {
      border-top: var(--thin) solid var(--line);
      padding: 9px 10px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
      background: white;
    }

    .mini-btn,
    .mini-btn:visited {
      border: var(--thin) solid var(--line);
      background: var(--bg);
      min-height: 32px;
      padding: 7px 12px;
      font-size: 0.72rem;
      font-weight: 900;
      line-height: 1.14;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: -0.01rem;
      box-shadow: 2px 2px 0 rgba(26, 26, 26, 0.08);
    }

    .mini-btn.primary {
      background: var(--line);
      color: white !important;
    }

    .section {
      border: var(--thick) solid var(--line);
      background: white;
    }

    .section-head {
      padding: 11px 12px 9px;
      text-align: center;
      font-size: 0.94rem;
      font-weight: 900;
      line-height: 1.2;
    }

    .section-rule {
      border-top: var(--thin) solid var(--line);
    }

    .section-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 70px;
    }

    .empty {
      border: 1px dashed rgba(26, 26, 26, 0.55);
      padding: 18px 10px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 800;
      line-height: 1.5;
      opacity: 0.72;
    }

    .card {
      border: var(--thin) solid var(--line);
      background: var(--bg);
      padding: 10px;
      box-shadow: 3px 3px 0 rgba(26, 26, 26, 0.07);
    }

    .fav-card {
      cursor: pointer;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .card-name {
      min-width: 0;
      font-size: 0.98rem;
      font-weight: 900;
      line-height: 1.25;
      word-break: keep-all;
    }

    .status {
      flex-shrink: 0;
      border: 1px solid var(--line);
      background: white;
      padding: 2px 7px;
      font-size: 0.63rem;
      font-weight: 900;
      line-height: 1.15;
      white-space: nowrap;
      box-shadow: 2px 2px 0 rgba(26, 26, 26, 0.06);
    }

    .status.pending { color: var(--point) !important; }
    .status.approved { color: #126b2f !important; }
    .status.rejected { color: #b00020 !important; }
    .status.open { color: var(--point) !important; }
    .status.resolved { color: #126b2f !important; }

    .card-text {
      border-top: 1px dashed rgba(26, 26, 26, 0.38);
      padding-top: 7px;
      font-size: 0.74rem;
      font-weight: 700;
      line-height: 1.45;
      opacity: 0.76;
      word-break: keep-all;
    }

    .answer-box {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed rgba(26, 26, 26, 0.38);
      display: grid;
      gap: 4px;
    }

    .answer-label {
      font-size: 0.66rem;
      font-weight: 900;
      line-height: 1.2;
      opacity: 0.72;
    }

    .answer-text {
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1.5;
      word-break: keep-all;
    }

    .answer-meta {
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1.4;
      opacity: 0.72;
      word-break: keep-all;
    }

    .card-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .card-actions .mini-btn {
      background: white;
      font-size: 0.7rem;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: white;
      width: 88%;
      max-width: 380px;
      padding: 20px;
      border: var(--thick) solid var(--line);
    }

    .modal-meta {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    #m-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }

    .tag-small {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: white;
      padding: 2px 6px;
      font-size: 0.66rem;
      font-weight: 900;
      line-height: 1.2;
      white-space: nowrap;
    }

    .modal-copy {
      margin-bottom: 15px;
      display: grid;
      gap: 8px;
      word-break: keep-all;
    }

    .modal-copy-text {
      padding: 12px;
      border: 1px dashed var(--line);
      background: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.7;
    }

    .modal-signature {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 0 2px;
      opacity: 0.74;
    }

    .modal-signature-label {
      flex: 0 0 auto;
      border: 1px solid rgba(26, 26, 26, 0.5);
      background: var(--bg);
      padding: 2px 6px;
      font-size: 0.65rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .modal-signature-value {
      min-width: 0;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1.5;
    }

    .modal-copy-empty {
      padding: 12px;
      border: 1px dashed var(--line);
      font-size: 0.84rem;
      font-weight: 700;
      opacity: 0.7;
    }

    .fav-btn {
      flex: 0 0 auto;
      width: auto;
      min-width: 0;
      height: auto;
      border: none;
      background: transparent;
      font-size: 1.45rem;
      font-weight: 900;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0 2px;
      box-shadow: none;
    }

    .fav-btn.is-on {
      color: var(--line) !important;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .modal-btn {
      width: 100%;
      padding: 12px 10px;
      border: var(--thin) solid var(--line);
      background: white;
      font-weight: 900;
      letter-spacing: -0.01rem;
      cursor: pointer;
      text-align: center;
    }

    .modal-btn.is-hidden {
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 360px) {
      body { padding-top: 24px; }
      .page { width: 94%; }
      .hero-title { font-size: 1.55rem; }
      .card-top { flex-direction: column; }
      .status { align-self: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1 class="hero-title">[ 마이페이지 ]</h1>
      <div id="me" class="account-line">불러오는 중...</div>
      <nav id="menu" class="action-strip"></nav>
    </section>

    <section class="section">
      <h2 class="section-head">찜한 카페</h2>
      <div class="section-rule"></div>
      <div id="fav-list" class="section-body">
        <div class="empty">찜 목록을 불러오는 중입니다.</div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-head">내 제보</h2>
      <div class="section-rule"></div>
      <div id="sub-list" class="section-body">
        <div class="empty">제보 내역을 불러오는 중입니다.</div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-head">내 오류 제보</h2>
      <div class="section-rule"></div>
      <div id="error-list" class="section-body">
        <div class="empty">오류 제보 내역을 불러오는 중입니다.</div>
      </div>
    </section>
  </main>

  <div id="modal-bg" class="overlay" onclick="this.style.display='none'">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-meta">
        <div id="m-tags"></div>
        <button id="btn-favorite" class="fav-btn" type="button" aria-label="찜">★</button>
      </div>
      <h2 id="m-name" style="font-size:1.4rem; font-weight:900; border-bottom:var(--thick) solid var(--line); padding-bottom:10px; margin-bottom:15px;"></h2>
      <div id="m-desc" class="modal-copy"></div>
      <div class="modal-actions">
        <button id="btn-map" class="modal-btn" type="button">📍 네이버 지도 보기</button>
        <button id="btn-share" class="modal-btn" type="button">🔗 공유하기</button>
        <button id="btn-insta" class="modal-btn is-hidden" type="button">✨ 인스타 보기</button>
        <button id="btn-bean" class="modal-btn is-hidden" type="button">🫘 원두 구매</button>
      </div>
    </div>
  </div>

  <script type="module" src="./assets/mypage.js"></script>
</body>
</html>
